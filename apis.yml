aid: flower-shop-network
name: Flower Shop Network
description: Flower Shop Network is a platform that connects customers with local florists across the country. They provide
  an online marketplace where users can browse and purchase a wide variety of floral arrangements for all occasions, and expose
  a JSON API for partner POS systems to authenticate, look up products and florists, and exchange wire orders across the FSN
  florist network.
