naftiko: 1.0.0-alpha2
info:
  label: Flower Shop Network JSON API — Products
  description: 'Flower Shop Network JSON API — Products. 1 operations. Lead operation: Load product data. Self-contained Naftiko
    capability covering one Flower Shop Network business surface.'
  tags:
  - Flower Shop Network
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FLOWER_SHOP_NETWORK_API_KEY: FLOWER_SHOP_NETWORK_API_KEY
capability:
  consumes:
  - type: http
    namespace: flower-shop-network-products
    baseUri: https://api.flowershopnetwork.com/api
    description: Flower Shop Network JSON API — Products business capability. Self-contained, no shared references.
    resources:
    - name: MyfsnProduct.apiLoadProductData
      path: /MyfsnProduct.apiLoadProductData
      operations:
      - name: post
        method: POST
        description: Load product data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: flower-shop-network-products-rest
    port: 8080
    description: REST adapter for Flower Shop Network JSON API — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/myfsnproduct-apiloadproductdata
      name: myfsnproduct-apiloadproductdata
      description: REST surface for MyfsnProduct.apiLoadProductData.
      operations:
      - method: POST
        name: post
        description: Load product data
        call: flower-shop-network-products.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flower-shop-network-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Flower Shop Network JSON API — Products. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: load-product-data
      description: Load product data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: flower-shop-network-products.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
